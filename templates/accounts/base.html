<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ChatAccount{% endblock %}</title>
    <style>
        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --text: #0f172a;
            --muted: #475569;
            --border: #dbe2ea;
            --accent: #1d4ed8;
            --accent-soft: #dbeafe;
            --success-bg: #d1fae5;
            --success-text: #065f46;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
        }
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 280px); color: var(--text); }
        .page { max-width: 980px; margin: 0 auto; padding: 24px; background: var(--surface); border-radius: 18px; box-shadow: 0 20px 48px rgba(15,23,42,0.08); }
        h1 { margin-top: 0; }
        h2, h3 { margin-bottom: 12px; }
        p { color: var(--muted); }
        form { display: grid; gap: 16px; }
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: #fff; }
        textarea { resize: vertical; }
        button, .button-link { display: inline-block; padding: 10px 14px; border: none; border-radius: 10px; background: var(--accent); color: white; cursor: pointer; text-decoration: none; }
        .messages { margin-bottom: 16px; }
        .message { padding: 12px 14px; border-radius: 8px; }
        .message.error { background: var(--error-bg); color: var(--error-text); }
        .message.success { background: var(--success-bg); color: var(--success-text); }
        .message.info { background: var(--accent-soft); color: #1e40af; }
        .nav { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .nav a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .header-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 20px 0; }
        .card { background: var(--surface-soft); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--text); margin: 8px 0 0; }
        .inline-actions { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; }
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); font-size: 0.92rem; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; background: var(--accent-soft); color: #1e3a8a; font-size: 0.85rem; font-weight: 600; }
        .list-clean { list-style: none; margin: 0; padding: 0; display: grid; gap: 12px; }
        .split { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; }
        .muted { color: var(--muted); }
        .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; align-items: end; }
        .form-shell { background: var(--surface-soft); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
        .errorlist { margin: 4px 0 0; color: var(--error-text); }
        @media (max-width: 768px) {
            body { padding: 16px; }
            .page { padding: 18px; }
            .split { grid-template-columns: 1fr; }
            .header-row { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="nav">
            {% if not request.session.supabase_user %}
                <a href="{% url 'accounts:login' %}">Login</a>
                <a href="{% url 'accounts:signup' %}">Signup</a>
            {% else %}
                <a href="{% url 'accounts:profile' %}">Profile</a>
                <a href="{% url 'accounts:transactions' %}">Transactions</a>
                <a href="{% url 'accounts:categories' %}">Categories</a>
                <a href="{% url 'accounts:customers' %}">Customers</a>
                <a href="{% url 'accounts:invoice_list' %}">Invoices</a>
                <a href="{% url 'accounts:reports' %}">Reports</a>
                <a href="{% url 'accounts:chat' %}">Chat</a>
            {% endif %}
        </div>
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
